<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SYSU ISE Campus Atlas</title>
  <desc id="desc">A campus atlas full-stack platform for web, Android and WeChat</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071B22"/>
      <stop offset="0.55" stop-color="#0A332D"/>
      <stop offset="1" stop-color="#12604A"/>
    </linearGradient>
    <linearGradient id="accent" x1="150" y1="80" x2="420" y2="330" gradientUnits="userSpaceOnUse">
