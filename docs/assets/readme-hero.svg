      <stop stop-color="#F6FFFA"/>
      <stop offset="1" stop-color="#DDF7E9"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#88E5B4" fill-opacity="0.16"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#001B14" flood-opacity="0.35"/>
    </filter>
  </defs>

