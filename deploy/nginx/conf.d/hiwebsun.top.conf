# 放在 http {} 作用域内（通常 sites-enabled/*.conf 被 include 到 http 里）
# 如果你的部署方式不是这样，请把这两个 map 挪到 nginx.conf 的 http {} 中

map $http_origin $cors_allow_origin {
    default "";

    # Capacitor / WebView 常见来源（安卓/调试）
    "~^https?://localhost(:[0-9]+)?$" $http_origin;
    "capacitor://localhost"           $http_origin;
    "ionic://localhost"               $http_origin;

    # 你的线上域名（浏览器场景兜底）
    "https://hiwebsun.top"            $http_origin;
    "https://www.hiwebsun.top"        $http_origin;
    "https://sysuzgxytj.top"          $http_origin;
    "https://www.sysuzgxytj.top"      $http_origin;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# -----------------------------
# 80 -> HTTPS + 统一裸域
# -----------------------------
server {
    listen 80;
    server_name hiwebsun.top www.hiwebsun.top sysuzgxytj.top www.sysuzgxytj.top;
    return 301 https://hiwebsun.top$request_uri;
}

# -----------------------------
# 443 别名域名 -> 裸域
# 说明：这里需要证书覆盖这些域名，才能先完成 TLS 再跳转
# -----------------------------
server {
    listen 443 ssl http2;
    server_name www.hiwebsun.top sysuzgxytj.top www.sysuzgxytj.top;

    ssl_certificate     /etc/letsencrypt/live/hiwebsun.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hiwebsun.top/privkey.pem;

    return 301 https://hiwebsun.top$request_uri;
}

# -----------------------------
# 主站（裸域）
# -----------------------------
server {
    listen 443 ssl http2;
    server_name hiwebsun.top;

    ssl_certificate     /etc/letsencrypt/live/hiwebsun.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hiwebsun.top/privkey.pem;

    # 可选：确认无误后再开启 HSTS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    root  /www/web-h5/dist;
    index index.html;

    client_max_body_size 20m;

    # 静态资源长缓存（带 hash）
    location ~* \.(?:js|css|png|jpe?g|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 文本验证等
    location ~* \.txt$ {
        root /www/web-h5/dist;
        default_type text/plain;
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # index.html 不缓存（SPA）
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # ===== /api/* -> Node=====
    # 例如 /api/rank/list -> http://127.0.0.1:3000/rank/list
    location ^~ /api/ {
        # 预检请求（CORS）
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_allow_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, Accept, Origin, Cache-Control, Pragma" always;
            add_header Access-Control-Max-Age           86400 always;
            add_header Vary                             "Origin" always;
            add_header Content-Length                   0;
            add_header Content-Type                     text/plain;
            return 204;
        }

        # 实际请求（CORS）
        add_header Access-Control-Allow-Origin      $cors_allow_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary                             "Origin" always;
        add_header Cache-Control                    "no-store" always;

        proxy_pass http://127.0.0.1:3000/;   # 尾部 / 很关键（去前缀）
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ===== 小程序/APP 直连原始路径接口（保留）=====
    location ~ ^/(home|locations|login_or_register|auth|checkin|rank|bottle|admin|avatar|health)(/|$) {
        # 预检请求（CORS）
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_allow_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, Accept, Origin, Cache-Control, Pragma" always;
            add_header Access-Control-Max-Age           86400 always;
            add_header Vary                             "Origin" always;
            add_header Content-Length                   0;
            add_header Content-Type                     text/plain;
            return 204;
        }

        # 实际请求（CORS）
        add_header Access-Control-Allow-Origin      $cors_allow_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary                             "Origin" always;
        add_header Cache-Control                    "no-store" always;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # SPA 回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
